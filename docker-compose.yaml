version: "3.8"

services:

  recruitment-app:
    build: .
    container_name: recruitment-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://rootuser:rootpassword@mongodb:27017/hr_system?authSource=admin
      DB_NAME: hr_system
      DEFAULT_ADMIN_ID: project
      DEFAULT_ADMIN_PASSWORD: project123
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6
    container_name: recruitment-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rootuser
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
