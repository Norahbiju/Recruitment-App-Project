apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-app-service
spec:
  type: NodePort
  selector:
    app: recruitment-app
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30007   # you can change this if needed (30000–32767)

      
